# Foundry configuration for the ZYL Genesis Pass 2 test suite.
#
# Setup:
#   forge install foundry-rs/forge-std --no-commit
#   forge test --match-contract ZylGenesisVectors -vv
#
# Coverage targets per spec §VIII:
#   forge coverage --report lcov && genhtml lcov.info -o coverage_html
#   Line ≥ 95%, Branch ≥ 90% (excluding test files themselves).

[profile.default]
src = "contracts"
out = "out"
libs = ["lib", "node_modules"]
test = "test/foundry"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
fuzz = { runs = 10000, max_test_rejects = 65536 }
invariant = { runs = 256, depth = 50, fail_on_revert = false }

remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
  "forge-std/=lib/forge-std/src/",
  "contracts/=contracts/",
]

[profile.ci]
fuzz = { runs = 50000 }
invariant = { runs = 500, depth = 200 }
